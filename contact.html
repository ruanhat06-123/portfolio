  <h1>Contact Me</h1>

 <form action="https://formspree.io/f/mlgkvdko" method="POST">

  <label for="name">Full Name:</label>
  <input type="text" id="name" name="name" required placeholder="John Doe" />

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required placeholder="john.doe@example.com" />

 <div class="custom-dropdown">
  <p>Subject:</p>
  <div class="selected">
    <span class="selected-text">Select Subject</span>
    <span class="arrow">▼</span>
  </div>

  <div class="options">
    <div data-value="job">Job Opportunity</div>
    <div data-value="question">General Question</div>
    <div data-value="feedback">Feedback</div>
    <div data-value="website">Website Enquiry</div>
    <div data-value="review">Leave a review</div>
    <div data-value="other">Other</div>
  </div>
</div>

<input type="hidden" id="subject" name="subject" required>

  <label for="message">Message:</label>
  <textarea id="message" name="message" rows="5" required placeholder="Your message here..."></textarea>

  <button type="submit">Send Message</button>

</form>
